    <main>
        <br>
        <section id="formulario">

            <h1>Vamos nos conhecer</h1>

            <p>Preencha seus dados para que possamos nos conhecer melhor. Em seguida, você receberá um e-mail meu para
                agendarmos uma entrevista.</p>

            <h2>Contato</h2>

            <form id="contatoForm">
                <p>
                    <label for="nome">Nome *</label><br>
                    <input type="text" id="nome" required>
                </p>

                <p>
                    <label for="email">E-mail *</label><br>
                    <input type="email" id="email" required>
                </p>


                <label for="observacao">Observação</label>
                <textarea id="observacao" rows="6" placeholder="Digite sua mensagem aqui..."></textarea><br>


                <div class="center">
                    <button type="submit" class="button_formulario">
                        Enviar Mensagem
                    </button>
                </div>

            </form>
        </section>

    </main>
